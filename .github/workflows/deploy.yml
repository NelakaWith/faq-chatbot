name: Deploy DeClerk

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to deploy (e.g. v1.2.3). If blank the workflow will deploy the latest GitHub Release."
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Resolve ref to deploy
        id: resolve_ref
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ] && [ "${{ github.event.inputs.tag }}" != "" ]; then
            REF="${{ github.event.inputs.tag }}"
            echo "Using manual tag: $REF"
          else
            REF=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r .tag_name)
            echo "Using latest release: $REF"
          fi
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Install and build
        run: |
          npm ci
          cd frontend && npm ci && npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # Check if directory exists and has git repository
            if [ ! -d ~/faq-chatbot ] || [ ! -d ~/faq-chatbot/.git ]; then
              echo "Cloning repository..."
              rm -rf ~/faq-chatbot
              git clone https://github.com/${{ github.repository }}.git ~/faq-chatbot
            fi

            cd ~/faq-chatbot

            # Use the resolved ref or default to main
            DEPLOY_REF="${{ steps.resolve_ref.outputs.ref }}"
            if [ -n "$DEPLOY_REF" ] && [ "$DEPLOY_REF" != "null" ]; then
              echo "Deploying specific ref: $DEPLOY_REF"
              git fetch --all
              git checkout $DEPLOY_REF 2>/dev/null || git pull origin main
            else
              echo "Deploying main branch"
              git pull origin main
            fi

            # Backup current PM2 process list (if running)
            pm2 save --force 2>/dev/null || true
            cp ~/.pm2/dump.pm2 backup_dump.pm2 2>/dev/null || true

            # Stop and delete any existing backend process
            pm2 stop faq-chatbot-backend 2>/dev/null || true
            pm2 delete faq-chatbot-backend 2>/dev/null || true

            # Install backend dependencies
            cd backend
            if ! npm ci --legacy-peer-deps; then
              echo "❌ npm ci failed. Attempting to restore previous backend..."
              cd ..
              if [ -f ~/faq-chatbot/backup_dump.pm2 ]; then
                pm2 kill
                cp ~/faq-chatbot/backup_dump.pm2 ~/.pm2/dump.pm2
                pm2 resurrect
                pm2 status
              fi
              exit 1
            fi

            # Try to start new backend
            if ! pm2 start server.js --name faq-chatbot-backend; then
              echo "❌ pm2 start failed. Attempting to restore previous backend..."
              cd ..
              if [ -f ~/faq-chatbot/backup_dump.pm2 ]; then
                pm2 kill
                cp ~/faq-chatbot/backup_dump.pm2 ~/.pm2/dump.pm2
                pm2 resurrect
                pm2 status
              fi
              exit 1
            fi

            # Build frontend and deploy
            cd ../frontend
            npm ci
            npm run build
            sudo cp -r dist/* /var/www/faq-chatbot/
            sudo systemctl reload nginx

            # Verify backend is running
            pm2 status faq-chatbot-backend
